<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InternHub</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect trick
    // Encodes the full path + query + hash into a query param and redirects to the root
    // so that index.html / React Router can restore it.
    var segmentCount = 1; // number of path segments in the base URL (1 for /InternHub)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
